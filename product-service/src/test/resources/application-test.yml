server:
  port: 0  # 随机端口

spring:
  application:
    name: product-service-test
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  h2:
    console:
      enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - de.codecentric.boot.admin.client.SpringBootAdminClientAutoConfiguration

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 禁用Eureka
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

# 禁用Swagger
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# 禁用Actuator
management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.insurance.product: DEBUG
